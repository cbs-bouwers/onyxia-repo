apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-express-app.fullname" . }}
  namespace: user-max
  labels:
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    app.kubernetes.io/name: libreoffice
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "my-express-app.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "my-express-app.name" . }}
        app.kubernetes.io/name: libreoffice
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: Helm
    spec:
      containers:
        - name: {{ include "my-express-app.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SELKIES_KEEP_ALIVE
              value: "true"
            - name: SELKIES_SCALING_DPI
              value: "144"
            # - name: DISPLAY
            #   value: ":1"
            # - name: DPI
            #   value: "144"
          ports:
            - containerPort: {{ .Values.service.targetPort }}
            