apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-sync
  namespace: onyxia
spec:
  schedule: "*/1 * * * *"  # every minute
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: git-sync
              image: alpine/git
              command:
                - sh
                - -c
                - |
                  cd /workspace
                  git add .
                  git diff --cached --quiet || git commit -m "Auto-sync $(date)"
                  git pull --rebase origin main || true
                  git push origin main || true
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
          volumes:
            - name: workspace
              persistentVolumeClaim:
                claimName: jupyter-workspace-pvc