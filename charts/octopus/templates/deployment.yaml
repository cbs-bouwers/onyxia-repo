apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-express-app.fullname" . }}
  namespace: user-max
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "my-express-app.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "my-express-app.name" . }}
    spec:
      containers:
        - name: {{ include "my-express-app.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          readinessProbe:
            httpGet:
              path: /api
              port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 5
          periodSeconds: 5
            